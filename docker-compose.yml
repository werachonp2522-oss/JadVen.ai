version: '3.8'

services:
  backend:
    build: ./backend
    container_name: jadven-backend
    ports:
      - "8002:8000"
    environment:
      - GEMINI_API_KEY=your_gemini_api_key_here
      - SECRET_KEY=dev_secret_key_change_me_in_production
    volumes:
      - ./backend/jadven.db:/app/jadven.db
    restart: always

  frontend:
    image: biewerachonp/jadven-frontend:latest
    container_name: jadven-frontend-docker
    ports:
      - "3002:3002"
    restart: always
